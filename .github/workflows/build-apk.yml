name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3 python3-dev openjdk-8-jdk
        sudo apt-get install -y libc6-dev-i386 lib32z1 lib32ncurses5 libstdc++6
        sudo apt-get install -y zlib1g-dev libncurses5-dev libtinfo5 libbz2-1.0
        sudo apt-get install -y automake libtool pkg-config libffi-dev
    
    - name: Install buildozer
      run: |
        pip3 install buildozer cython
    
    - name: Build APK
      run: |
        buildozer android debug
      env:
        ANDROID_HOME: /opt/android-sdk
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: salon-coifure-apk
        path: bin/*.apk
