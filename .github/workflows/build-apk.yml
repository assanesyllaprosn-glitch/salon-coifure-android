name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_SDK_ACCEPT_LICENSES: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3 python3-dev openjdk-17-jdk
        sudo apt-get install -y libc6-dev-i386 lib32z1 lib32ncurses6 libstdc++6
        sudo apt-get install -y zlib1g-dev libbz2-1.0
        sudo apt-get install -y automake libtool pkg-config libffi-dev
        sudo apt-get install -y autoconf libssl-dev
    
    - name: Install buildozer
      run: |
        pip3 install buildozer cython
    
    - name: Accept Android SDK licenses
      run: |
        mkdir -p ~/.android
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/repositories.cfg
        yes | sdkmanager --licenses || true
    
    - name: Build APK
      run: |
        yes | buildozer android debug
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: salon-coifure-apk
        path: bin/*.apk
